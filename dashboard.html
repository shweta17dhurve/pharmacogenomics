{% extends "base.html" %}

{% block content %}
<section class="portal-panel">
  <h2 class="section-title">Database Dashboard</h2>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="feature-card text-center">
        <h5>Total Genes</h5>
        <div class="stat-value">{{ total_genes }}</div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-card text-center">
        <h5>Total Drugs</h5>
        <div class="stat-value">{{ total_drugs }}</div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-card text-center">
        <h5>Total Interactions</h5>
        <div class="stat-value">{{ total_interactions }}</div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
