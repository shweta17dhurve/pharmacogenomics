{% extends "base.html" %}

{% block content %}
<section class="portal-panel">
  <h2 class="section-title">Drug Explorer</h2>
  <div class="list-group">
    {% for drug in drugs %}
    <form action="/search" method="post" class="mb-2">
      <input type="hidden" name="query" value="{{ drug }}">
      <button class="list-group-item list-group-item-action text-start" type="submit">
        {{ drug }}
      </button>
    </form>
    {% endfor %}
  </div>
</section>
{% endblock %}
